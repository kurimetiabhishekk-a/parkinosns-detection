<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta name="description" content="ParkiSense – Reset your password.">
    <title>ParkiSense – Forgot Password</title>
    <link href="{{ url_for('static', filename='vendor/fontawesome-free/css/all.min.css') }}" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link href="{{ url_for('static', filename='css/sb-admin-2.min.css') }}" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/modern-theme.css') }}" rel="stylesheet">
    <style>
        html,
        body {
            height: 100%;
            margin: 0;
            background: #0e0e20 !important;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
        }

        .auth-wrapper {
            width: 100%;
            padding: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .auth-card {
            display: flex;
            width: 100%;
            max-width: 880px;
            min-height: 480px;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 32px 80px rgba(0, 0, 0, 0.55);
        }

        .auth-panel-left {
            flex: 0 0 44%;
            position: relative;
            background: url("https://images.unsplash.com/photo-1507413245164-6160d8298b31?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80") center/cover no-repeat;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 2.5rem;
        }

        .auth-panel-left::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(160deg, rgba(30, 27, 75, 0.6) 0%, rgba(5, 5, 15, 0.9) 100%);
        }

        .auth-panel-left-content {
            position: relative;
            z-index: 2;
        }

        .auth-brand {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 0.6rem;
        }

        .auth-brand-icon {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 14px rgba(99, 102, 241, 0.5);
        }

        .auth-brand-icon i {
            color: #fff;
            font-size: 0.9rem;
        }

        .auth-brand-name {
            font-size: 1.3rem;
            font-weight: 800;
            background: linear-gradient(135deg, #818cf8, #c084fc);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .auth-tagline {
            font-size: 0.82rem;
            color: rgba(255, 255, 255, 0.6);
            margin: 0;
            line-height: 1.5;
        }

        .auth-panel-right {
            flex: 1;
            background: #1b1b2e;
            padding: 3rem 2.8rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .fp-icon {
            font-size: 2.4rem;
            color: #818cf8;
            margin-bottom: 1rem;
        }

        .auth-title {
            font-size: 1.4rem;
            font-weight: 800;
            color: #fff;
            margin-bottom: 0.5rem;
        }

        .auth-subtitle {
            font-size: 0.82rem;
            color: rgba(255, 255, 255, 0.45);
            margin-bottom: 1.8rem;
            line-height: 1.6;
        }

        .auth-field-group {
            margin-bottom: 1rem;
        }

        .auth-input {
            width: 100%;
            background: rgba(255, 255, 255, 0.06) !important;
            border: 1px solid rgba(255, 255, 255, 0.12) !important;
            color: #fff !important;
            border-radius: 12px !important;
            padding: 0.9rem 1.1rem !important;
            font-size: 0.88rem !important;
            font-family: 'Inter', sans-serif !important;
            transition: border-color 0.2s, background 0.2s !important;
            outline: none !important;
        }

        .auth-input::placeholder {
            color: rgba(255, 255, 255, 0.35) !important;
        }

        .auth-input:focus {
            background: rgba(255, 255, 255, 0.1) !important;
            border-color: #6366f1 !important;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15) !important;
        }

        .auth-submit-btn {
            width: 100%;
            padding: 0.9rem;
            border-radius: 12px;
            border: none;
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            color: #fff;
            font-size: 0.93rem;
            font-weight: 700;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            box-shadow: 0 8px 24px -4px rgba(99, 102, 241, 0.5);
            transition: all 0.22s ease;
            text-decoration: none;
            display: block;
            text-align: center;
        }

        .auth-submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 14px 32px -4px rgba(99, 102, 241, 0.6);
            color: #fff;
            text-decoration: none;
        }

        .auth-divider {
            border: none;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            margin: 1.6rem 0 1.2rem;
        }

        .auth-links {
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 0.45rem;
        }

        .auth-links a {
            font-size: 0.82rem;
            color: #a5b4fc;
            text-decoration: none;
            transition: color 0.2s;
        }

        .auth-links a:hover {
            color: #c7d2fe;
        }

        @media (max-width: 640px) {
            .auth-panel-left {
                display: none;
            }
        }
    </style>
</head>

<body>
    <div class="auth-wrapper">
        <div class="auth-card animate-fade-in">

            <!-- Left: Image panel -->
            <div class="auth-panel-left">
                <div class="auth-panel-left-content">
                    <div class="auth-brand">
                        <div class="auth-brand-icon">
                            <i class="fas fa-lock"></i>
                        </div>
                        <span class="auth-brand-name">ParkiSense</span>
                    </div>
                    <p class="auth-tagline">Data security is our<br>top priority.</p>
                </div>
            </div>

            <!-- Right: Forgot password form -->
            <div class="auth-panel-right">
                <div class="fp-icon"><i class="fas fa-lock"></i></div>
                <h1 class="auth-title">Forgot Your Password?</h1>
                <p class="auth-subtitle">We get it, stuff happens. Just enter your email address below and we'll send
                    you a link to reset your password!</p>

                {% if error %}
                <div
                    style="background: {% if 'Your password' in error %}rgba(16, 185, 129, 0.1){% else %}rgba(239, 68, 68, 0.1){% endif %}; border: 1px solid {% if 'Your password' in error %}rgba(16, 185, 129, 0.22){% else %}rgba(239, 68, 68, 0.22){% endif %}; color: {% if 'Your password' in error %}#6ee7b7{% else %}#fca5a5{% endif %}; padding: 0.65rem 1rem; border-radius: 10px; font-size: 0.81rem; margin-bottom: 1rem; display: flex; align-items: center; gap: 8px;">
                    <i
                        class="fas fa-{% if 'Your password' in error %}check-circle{% else %}exclamation-circle{% endif %}"></i>
                    {{ error }}
                </div>
                {% endif %}

                <form class="user" method="POST" action="/forgot">
                    <div class="auth-field-group">
                        <label
                            style="color:rgba(255,255,255,0.55);font-size:0.78rem;font-weight:600;display:block;margin-bottom:0.4rem;">Email
                            Address</label>
                        <input type="email" class="auth-input" name="email" id="fpEmail"
                            placeholder="Enter your email address..." required>
                    </div>
                    <div class="auth-field-group">
                        <label
                            style="color:rgba(255,255,255,0.55);font-size:0.78rem;font-weight:600;display:block;margin-bottom:0.4rem;">Security
                            Question: What is your pet's name?</label>
                        <input type="text" class="auth-input" name="pet" id="fpPet" placeholder="Your pet's name..."
                            required>
                    </div>
                    <button type="submit" class="auth-submit-btn">Recover Password</button>
                </form>

                <hr class="auth-divider">

                <div class="auth-links">
                    <a href="/register">Create an Account!</a>
                    <a href="/login">Already have an account? Login!</a>
                </div>
            </div>

        </div>
    </div>
</body>

</html>
