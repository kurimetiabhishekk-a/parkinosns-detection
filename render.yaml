services:
  - type: web
    name: parkisense secure
    runtime: docker
    plan: free
    region: oregon
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        value: parkisense_secure_render_2024
      - key: MONGODB_URI
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
