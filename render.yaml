services:
  - type: web
    name: parkisense secure
    runtime: python
    plan: free
    region: oregon
    buildCommand: "pip install --no-cache-dir pip setuptools wheel && pip install --no-cache-dir -r requirements_render.txt"
    startCommand: "gunicorn --workers=1 --timeout=150 --bind=0.0.0.0:$PORT main:app"
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.12
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        value: parkisense_secure_render_2024
      - key: MONGODB_URI
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
