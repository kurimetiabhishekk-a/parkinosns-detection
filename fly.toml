app = "parkisense"
primary_region = "sin"          # Singapore — closest to India

[build]
  dockerfile = "Dockerfile"

[env]
  FLASK_ENV = "production"
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = "1gb"                # TensorFlow needs at least 512MB; 1GB recommended
  cpu_kind = "shared"
  cpus = 1
